<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CIBERPUNK TRADER BITCOIN WALLET</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <header class="banner">
    <h1>⚡ CIBERPUNK TRADER BITCOIN WALLET ⚡</h1>
    <p class="subtitle">Edmundo & Copilot — Panel ceremonial vivo</p>
  </header>

  <div class="app">
    <div class="equity-hero" id="equityHero">
      <div class="hero-label">Total Equity</div>
      <div class="equity-hero-row">
        <div class="hero-value" id="heroValue">—</div>
        <div class="hero-controls">
          <div class="hero-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">...</span>
          </div>
          <div class="hero-sep"></div>
          <select class="hero-select" id="refreshInterval" onchange="setRefreshInterval()">
            <option value="0">off</option>
            <option value="10">10s</option>
            <option value="30" selected>30s</option>
            <option value="60">1m</option>
            <option value="300">5m</option>
          </select>
          <button class="hero-btn" onclick="refreshAll()">↻</button>
        </div>
      </div>
    </div>
    <div id="walletContainer"></div>
  </div>

  <!-- Modal Funding -->
  <div class="modal-overlay" id="fundingModal" onclick="closeFundingModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">
          Funding History
          <span class="coin-tag" id="modalCoinTag">—</span>
          <span class="wallet-tag" id="modalWalletTag">—</span>
        </div>
        <button class="modal-close" onclick="closeFundingModal(event)">&times;</button>
      </div>
      <div class="modal-summary" id="modalSummary"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter">last 7 days of funding</div>
    </div>
  </div>

  <footer>
    <p>© 2026 Edmundo Ramírez & Copilot — Cyberpunk Defense</p>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
